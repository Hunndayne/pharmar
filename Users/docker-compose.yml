services:
  auth-db:
    image: postgres:16-alpine
    container_name: pharmar-auth-db
    environment:
      POSTGRES_DB: pharmar_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
      - ./Database/Auth.sql:/docker-entrypoint-initdb.d/01-auth.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pharmar_auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  users-service:
    build:
      context: .
      dockerfile: dockerfile
    container_name: pharmar-users-service
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@auth-db:5432/pharmar_auth
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
    ports:
      - "8001:8001"
    depends_on:
      auth-db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  auth_db_data:
