services:
  postgres:
    image: postgres:16-alpine
    container_name: pharmar-postgres
    environment:
      POSTGRES_DB: pharmar_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Database/init/01-create-databases.sql:/docker-entrypoint-initdb.d/00-create-databases.sql:ro
      - ./Users/Database/Auth.sql:/docker-entrypoint-initdb.d/01-auth.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pharmar_auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-bootstrap:
    image: postgres:16-alpine
    container_name: pharmar-db-bootstrap
    environment:
      PGPASSWORD: postgres
    command: >
      sh -c "psql -h postgres -U postgres -d postgres -f /scripts/01-create-databases.sql"
    volumes:
      - ./Database/init/01-create-databases.sql:/scripts/01-create-databases.sql:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: pharmar-redis
    ports:
      - "6379:6379"

  users-service:
    build:
      context: ./Users
      dockerfile: dockerfile
    container_name: pharmar-users-service
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/pharmar_auth
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      db-bootstrap:
        condition: service_completed_successfully
    restart: unless-stopped

  inventory-service:
    build:
      context: ./Inventory Service
      dockerfile: dockerfile
    container_name: pharmar-inventory-service
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pharmar_inventory
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      STATE_PERSISTENCE: postgres
      STATE_FILE_PATH: /data/runtime_state.json
      CATALOG_SERVICE_URL: http://catalog-service:8006
    volumes:
      - inventory_state_data:/data
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      db-bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_started
    restart: unless-stopped

  sale-service:
    build:
      context: ./Sale
      dockerfile: dockerfile
    container_name: pharmar-sale-service
    environment:
      INVENTORY_SERVICE_URL: http://inventory-service:8002
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
    ports:
      - "8003:8003"
    depends_on:
      inventory-service:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

  report-service:
    build:
      context: ./Report
      dockerfile: dockerfile
    container_name: pharmar-report-service
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8004:8004"
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

  store-service:
    build:
      context: ./Store
      dockerfile: dockerfile
    container_name: pharmar-store-service
    environment:
      APP_PORT: 8005
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/pharmar_store?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      SETTINGS_CACHE_TTL_SECONDS: 300
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      LOGO_UPLOAD_DIR: /app/uploads
      DEFAULT_STORE_NAME: Nha thuoc Pharmar
    ports:
      - "8005:8005"
    depends_on:
      postgres:
        condition: service_healthy
      db-bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_started
    restart: unless-stopped

  catalog-service:
    build:
      context: ./Catalog Service
      dockerfile: dockerfile
    container_name: pharmar-catalog-service
    environment:
      APP_PORT: 8006
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/pharmar_catalog
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      INVENTORY_SERVICE_URL: http://inventory-service:8002
    ports:
      - "8006:8006"
    depends_on:
      postgres:
        condition: service_healthy
      db-bootstrap:
        condition: service_completed_successfully
      inventory-service:
        condition: service_started
    restart: unless-stopped

  customer-service:
    build:
      context: ./Customer Service
      dockerfile: dockerfile
    container_name: pharmar-customer-service
    environment:
      APP_PORT: 8007
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/pharmar_customer
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      INTERNAL_API_KEY: ${CUSTOMER_INTERNAL_API_KEY:-change-this-internal-key}
      STORE_SERVICE_URL: http://store-service:8005
      ENABLE_POINTS_EXPIRY_JOB: ${ENABLE_POINTS_EXPIRY_JOB:-true}
      POINTS_EXPIRY_JOB_INTERVAL_HOURS: ${POINTS_EXPIRY_JOB_INTERVAL_HOURS:-24}
    ports:
      - "8007:8007"
    depends_on:
      postgres:
        condition: service_healthy
      db-bootstrap:
        condition: service_completed_successfully
      store-service:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./FrontEnd
      dockerfile: dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: pharmar-frontend
    ports:
      - "3000:80"
    depends_on:
      api-gateway:
        condition: service_started
    restart: unless-stopped

  api-gateway:
    build:
      context: ./API Gateway
      dockerfile: dockerfile
    container_name: pharmar-api-gateway
    environment:
      AUTH_SERVICE_URL: http://users-service:8001
      SALE_SERVICE_URL: http://sale-service:8003
      INVENTORY_SERVICE_URL: http://inventory-service:8002
      REPORT_SERVICE_URL: http://report-service:8004
      STORE_SERVICE_URL: http://store-service:8005
      CATALOG_SERVICE_URL: http://catalog-service:8006
      CUSTOMER_SERVICE_URL: http://customer-service:8007
    ports:
      - "8000:8000"
    depends_on:
      users-service:
        condition: service_started
      sale-service:
        condition: service_started
      inventory-service:
        condition: service_started
      report-service:
        condition: service_started
      store-service:
        condition: service_started
      catalog-service:
        condition: service_started
      customer-service:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  inventory_state_data:
