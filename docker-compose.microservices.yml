services:
  postgres:
    image: postgres:16-alpine
    container_name: pharmar-postgres
    environment:
      POSTGRES_DB: pharmar_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Database/init/01-create-databases.sql:/docker-entrypoint-initdb.d/00-create-databases.sql:ro
      - ./Users/Database/Auth.sql:/docker-entrypoint-initdb.d/01-auth.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pharmar_auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-bootstrap:
    image: postgres:16-alpine
    container_name: pharmar-db-bootstrap
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
    command: >
      sh -c "psql -h postgres -U postgres -d postgres -f /scripts/01-create-databases.sql"
    volumes:
      - ./Database/init/01-create-databases.sql:/scripts/01-create-databases.sql:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: pharmar-redis

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: pharmar-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    restart: unless-stopped

  users-service:
    build:
      context: ./Users
      dockerfile: dockerfile
    container_name: pharmar-users-service
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/pharmar_auth
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-["http://localhost:3000","http://localhost:5173"]}
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      db-bootstrap:
        condition: service_completed_successfully
    restart: unless-stopped

  inventory-service:
    build:
      context: ./Inventory Service
      dockerfile: dockerfile
    container_name: pharmar-inventory-service
    environment:
      APP_ENV: ${APP_ENV:-development}
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/pharmar_inventory
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      STATE_PERSISTENCE: postgres
      STATE_FILE_PATH: /data/runtime_state.json
      CATALOG_SERVICE_URL: http://catalog-service:8006
      STORE_SERVICE_URL: http://store-service:8005
    volumes:
      - inventory_state_data:/data
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      db-bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_started
    restart: unless-stopped

  sale-service:
    build:
      context: ./Sale
      dockerfile: dockerfile
    container_name: pharmar-sale-service
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_PORT: 8003
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/pharmar_sale
      STORE_SERVICE_URL: http://store-service:8005
      CATALOG_SERVICE_URL: http://catalog-service:8006
      INVENTORY_SERVICE_URL: http://inventory-service:8002
      CUSTOMER_SERVICE_URL: http://customer-service:8007
      CUSTOMER_INTERNAL_API_KEY: ${CUSTOMER_INTERNAL_API_KEY:-change-this-internal-key}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      HELD_ORDER_EXPIRE_MINUTES: ${HELD_ORDER_EXPIRE_MINUTES:-30}
      ENABLE_HELD_ORDER_CLEANUP_JOB: ${ENABLE_HELD_ORDER_CLEANUP_JOB:-true}
      REQUIRE_SHIFT_FOR_SALE: ${REQUIRE_SHIFT_FOR_SALE:-false}
      DEFAULT_COMMISSION_RATE: ${DEFAULT_COMMISSION_RATE:-1.5}
      RABBITMQ_ENABLED: ${RABBITMQ_ENABLED:-true}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-pharmar.events}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-["http://localhost:3000","http://localhost:5173"]}
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      db-bootstrap:
        condition: service_completed_successfully
      users-service:
        condition: service_started
      store-service:
        condition: service_started
      catalog-service:
        condition: service_started
      inventory-service:
        condition: service_started
      customer-service:
        condition: service_started
      rabbitmq:
        condition: service_started
    restart: unless-stopped

  report-service:
    build:
      context: ./Report
      dockerfile: dockerfile
    container_name: pharmar-report-service
    environment:
      REDIS_URL: redis://redis:6379/0
      SALE_SERVICE_URL: http://sale-service:8003
      INVENTORY_SERVICE_URL: http://inventory-service:8002
      REPORT_CACHE_TTL_SECONDS: ${REPORT_CACHE_TTL_SECONDS:-120}
      RABBITMQ_ENABLED: ${RABBITMQ_ENABLED:-true}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-pharmar.events}
      RABBITMQ_QUEUE: ${REPORT_RABBITMQ_QUEUE:-report.sale.events}
      RABBITMQ_ROUTING_KEYS: ${REPORT_RABBITMQ_ROUTING_KEYS:-sale.invoice.created,sale.invoice.cancelled,sale.return.approved}
    ports:
      - "8004:8004"
    depends_on:
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    restart: unless-stopped

  store-service:
    build:
      context: ./Store
      dockerfile: dockerfile
    container_name: pharmar-store-service
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_PORT: 8005
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/pharmar_store?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      FILE_SERVICE_URL: http://file-service:8009
      INTERNAL_SERVICE_TOKEN_EXPIRE_MINUTES: ${INTERNAL_SERVICE_TOKEN_EXPIRE_MINUTES:-30}
      SETTINGS_CACHE_TTL_SECONDS: 300
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      LOGO_UPLOAD_DIR: /app/uploads
      BACKUP_DIR: /app/backups
      DEFAULT_STORE_NAME: Nha thuoc Pharmar
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-["http://localhost:3000","http://localhost:5173"]}
    volumes:
      - store_backups:/app/backups
    ports:
      - "8005:8005"
    depends_on:
      postgres:
        condition: service_healthy
      db-bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_started
    restart: unless-stopped

  catalog-service:
    build:
      context: ./Catalog Service
      dockerfile: dockerfile
    container_name: pharmar-catalog-service
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_PORT: 8006
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/pharmar_catalog
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      INVENTORY_SERVICE_URL: http://inventory-service:8002
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-["http://localhost:3000","http://localhost:5173"]}
    ports:
      - "8006:8006"
    depends_on:
      postgres:
        condition: service_healthy
      db-bootstrap:
        condition: service_completed_successfully
      inventory-service:
        condition: service_started
    restart: unless-stopped

  customer-service:
    build:
      context: ./Customer Service
      dockerfile: dockerfile
    container_name: pharmar-customer-service
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_PORT: 8007
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/pharmar_customer
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      INTERNAL_API_KEY: ${CUSTOMER_INTERNAL_API_KEY:-change-this-internal-key}
      STORE_SERVICE_URL: http://store-service:8005
      ENABLE_POINTS_EXPIRY_JOB: ${ENABLE_POINTS_EXPIRY_JOB:-true}
      POINTS_EXPIRY_JOB_INTERVAL_HOURS: ${POINTS_EXPIRY_JOB_INTERVAL_HOURS:-24}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-["http://localhost:3000","http://localhost:5173"]}
    ports:
      - "8007:8007"
    depends_on:
      postgres:
        condition: service_healthy
      db-bootstrap:
        condition: service_completed_successfully
      store-service:
        condition: service_started
    restart: unless-stopped

  file-service:
    build:
      context: ./File Service
      dockerfile: dockerfile
    container_name: pharmar-file-service
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_PORT: 8009
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/pharmar_store?sslmode=disable
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-pharmar-files}
      R2_PUBLIC_DOMAIN: ${R2_PUBLIC_DOMAIN:-}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-50}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-["http://localhost:3000","http://localhost:5173"]}
    ports:
      - "8009:8009"
    depends_on:
      postgres:
        condition: service_healthy
      db-bootstrap:
        condition: service_completed_successfully
    restart: unless-stopped

  notification-service:
    build:
      context: ./Notification Service
      dockerfile: dockerfile
    container_name: pharmar-notification-service
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_PORT: 8010
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/pharmar_notification
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      INTERNAL_API_KEY: ${NOTIFICATION_INTERNAL_API_KEY:-${CUSTOMER_INTERNAL_API_KEY:-change-this-internal-key}}
      RABBITMQ_ENABLED: ${RABBITMQ_ENABLED:-true}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-pharmar.events}
      RABBITMQ_QUEUE: ${NOTIFICATION_RABBITMQ_QUEUE:-notification.events}
      RABBITMQ_ROUTING_KEYS: ${NOTIFICATION_RABBITMQ_ROUTING_KEYS:-sale.invoice.created,sale.invoice.cancelled,sale.return.approved,inventory.low_stock}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-["http://localhost:3000","http://localhost:5173"]}
    ports:
      - "8010:8010"
    depends_on:
      postgres:
        condition: service_healthy
      db-bootstrap:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_started
    restart: unless-stopped

  payment-qr-service:
    build:
      context: ./Payment QR Service
      dockerfile: dockerfile
    container_name: pharmar-payment-qr-service
    env_file:
      - ./Payment QR Service/.env
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_PORT: 8008
      VIETQR_URL: ${VIETQR_URL:-https://api.vietqr.io/v2/generate}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
    ports:
      - "8008:8008"
    restart: unless-stopped

  frontend:
    build:
      context: ./FrontEnd
      dockerfile: dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/}
    container_name: pharmar-frontend
    ports:
      - "3000:80"
    depends_on:
      api-gateway:
        condition: service_started
    restart: unless-stopped

  api-gateway:
    build:
      context: ./API Gateway
      dockerfile: dockerfile
    container_name: pharmar-api-gateway
    environment:
      AUTH_SERVICE_URL: http://users-service:8001
      SALE_SERVICE_URL: http://sale-service:8003
      INVENTORY_SERVICE_URL: http://inventory-service:8002
      REPORT_SERVICE_URL: http://report-service:8004
      STORE_SERVICE_URL: http://store-service:8005
      CATALOG_SERVICE_URL: http://catalog-service:8006
      CUSTOMER_SERVICE_URL: http://customer-service:8007
      PAYMENT_QR_SERVICE_URL: http://payment-qr-service:8008
      RATE_LIMIT_RPM: ${RATE_LIMIT_RPM:-1200}
      AUTH_RATE_LIMIT_RPM: ${AUTH_RATE_LIMIT_RPM:-120}
      FILE_SERVICE_URL: http://file-service:8009
      NOTIFICATION_SERVICE_URL: http://notification-service:8010
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-["http://localhost:3000","http://localhost:5173"]}
    ports:
      - "8000:8000"
    depends_on:
      users-service:
        condition: service_started
      sale-service:
        condition: service_started
      inventory-service:
        condition: service_started
      report-service:
        condition: service_started
      store-service:
        condition: service_started
      catalog-service:
        condition: service_started
      customer-service:
        condition: service_started
      payment-qr-service:
        condition: service_started
      file-service:
        condition: service_started
      notification-service:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  inventory_state_data:
  store_backups:
